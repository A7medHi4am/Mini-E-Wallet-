version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: mini-e-wallet-db
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mini-e-wallet-backend
    env_file:
      - .env
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

  # Forwards Stripe webhook events to the backend for local testing.
  # Not started by default — only whoever is testing the top-up-with-card
  # flow needs it: `docker compose --profile stripe up stripe-cli`.
  # Prints a fresh "whsec_..." signing secret in its logs on every start;
  # copy that into .env as STRIPE_WEBHOOK_SECRET and restart the backend.
  stripe-cli:
    image: stripe/stripe-cli
    profiles: ["stripe"]
    command: listen --api-key ${STRIPE_SECRET_KEY} --forward-to backend:8080/api/wallet/topup/webhook
    depends_on:
      - backend

volumes:
  pgdata:
